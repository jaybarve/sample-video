<!DOCTYPE html>
<html>
<head>
<title>Practical No. 7</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.carousel-item img {
  height: 400px;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="container mt-4">
<h1 class="text-center"><b>Carousel and Grid Example</b></h1>

<div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">

<div class="carousel-indicators">
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4"></button>
</div>

<div class="carousel-inner">
<div class="carousel-item active">
<img src="https://i.pinimg.com/736x/6f/e2/03/6fe203a728505ed8e290838a551706ba.jpg" class="d-block w-100" alt="First slide">
</div>

<div class="carousel-item">
<img src="https://static0.polygonimages.com/wordpress/wp-content/uploads/2025/12/chris-evans-captain-america-doomsday-trailer.jpg?w=1200&h=675&fit=crop" class="d-block w-100" alt="Second slide">
</div>

<div class="carousel-item">
<img src="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/11/Chris-Evans-Skinny-Steve-Rogers-Captain-America-First-Avenger.jpg?q=70&fit=contain&w=750&h=422&dpr=1" class="d-block w-100" alt="Third slide">
</div>

<div class="carousel-item">
<img src="https://stanforddaily.com/wp-content/uploads/2019/05/AvengersEndgame5c9a7b9646625.jpg" class="d-block w-100" alt="Fourth slide">
</div>

<div class="carousel-item">
<img src="https://images.zoomnews.com/thumb/msid-152779512,width-1280,height-720,resizemode-75/152779512.jpg" class="d-block w-100" alt="Fifth slide">
</div>
</div>

<button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>
</div>

<br>

<div class="container text-center">

<div class="row mb-3">
<div class="col-3" style="background-color:grey;">col-3
<img src="https://phantom.estaticos-marca.com/9279e8039b9040209f07a16f0201dd63/resize/828/f/jpg/assets/multimedia/imagenes/2023/01/12/16735402991293.jpg" height="475" width="300">
</div>

<div class="col-6" style="background-color:red;">col-6
<iframe src="https://jaybarve.github.io/sample-video/ironman.mp4" height="475" width="600"></iframe>
</div>

<div class="col-3" style="background-color:Lavender;">col-3
<img src="https://images.tribuneindia.com/cms/gall_content/2019/4/2019_4$largeimg15_Monday_2019_083425749.jpg" height = "475" width= "300">
</div>
</div>

<div class="row mb-3">
<div class="col-sm-6" style="background-color:Lavender;">col-sm-6
<h1>This is the example of Heading</h1>
</div>
<div class="col-sm-6" style="background-color:#FBEAEB;">col-sm-6</div>
</div>

<div class="row mb-3">
<div class="col-md-5" style="background-color:#FBEAEB;">col-md-5</div>
<div class="col-md-5" style="background-color:Lavender;">col-md-5</div>
<div class="col-md-2" style="background-color:pink;">col-md-2</div>
</div>

<div class="row mb-3">
<div class="col-lg-4" style="background-color:#FBEAEB;">col-lg-4</div>
<div class="col-lg-4" style="background-color:Lavender;">col-lg-4</div>
<div class="col-lg-4" style="background-color:pink;">col-lg-4</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
